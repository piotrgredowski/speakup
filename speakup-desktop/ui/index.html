<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakup - Notification History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2a2a2a;
            padding: 1rem 2rem;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a9eff;
        }

        .stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #4a9eff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }

        .filters {
            background: #252525;
            padding: 1rem 2rem;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: #888;
        }

        input, select {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .search-input {
            flex: 1;
            max-width: 400px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .notifications-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .notification-item {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .notification-item:hover {
            background: #2a2a2a;
            border-color: #4a9eff;
        }

        .notification-item.selected {
            border-color: #4a9eff;
            background: #2a2a2a;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .notification-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
        }

        .notification-agent {
            font-weight: 600;
            color: #4a9eff;
        }

        .notification-event {
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .event-final { background: #2d5a2d; color: #90ee90; }
        .event-error { background: #5a2d2d; color: #ff9090; }
        .event-needs_input { background: #5a4a2d; color: #ffdd90; }
        .event-progress { background: #2d4a5a; color: #90ddff; }
        .event-info { background: #3a3a3a; color: #ccc; }

        .notification-time {
            font-size: 0.8rem;
            color: #888;
        }

        .notification-summary {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #d0d0d0;
        }

        .notification-status {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.5rem;
        }

        .status-ok { color: #90ee90; }
        .status-error { color: #ff9090; }
        .status-skipped { color: #ffdd90; }

        .detail-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 500px;
            height: 100vh;
            background: #2a2a2a;
            border-left: 1px solid #3a3a3a;
            padding: 2rem;
            transform: translateX(100%);
            transition: transform 0.3s;
            overflow-y: auto;
            z-index: 100;
        }

        .detail-panel.open {
            transform: translateX(0);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .detail-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .detail-close:hover {
            color: #e0e0e0;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .detail-value {
            background: #1a1a1a;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .play-button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .play-button:hover {
            background: #3a8eef;
        }

        .play-button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }

        .empty-state h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: #252525;
            border-top: 1px solid #3a3a3a;
        }

        .pagination button {
            background: #3a3a3a;
            color: #e0e0e0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .pagination button:hover:not(:disabled) {
            background: #4a4a4a;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #888;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Speakup</h1>
        <div class="stats">
            <div class="stat">
                <span class="stat-value" id="total-count">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="agent-count">0</span>
                <span class="stat-label">Agents</span>
            </div>
        </div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Agent:</label>
            <select id="filter-agent">
                <option value="">All</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Event:</label>
            <select id="filter-event">
                <option value="">All</option>
                <option value="final">Final</option>
                <option value="error">Error</option>
                <option value="needs_input">Needs Input</option>
                <option value="progress">Progress</option>
                <option value="info">Info</option>
            </select>
        </div>
        <div class="filter-group" style="flex: 1;">
            <input type="text" id="search-input" class="search-input" placeholder="Search notifications...">
        </div>
    </div>

    <div class="content">
        <div class="notifications-list" id="notifications-list">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <div class="pagination">
        <button id="prev-page" disabled>← Previous</button>
        <span class="page-info" id="page-info">Page 1</span>
        <button id="next-page">Next →</button>
    </div>

    <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
            <h2>Details</h2>
            <button class="detail-close" id="detail-close">×</button>
        </div>
        <div id="detail-content"></div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        
        let currentPage = 0;
        const pageSize = 50;
        let selectedId = null;
        let filters = {
            agent: '',
            event: '',
            search: ''
        };

        // DOM elements
        const notificationsList = document.getElementById('notifications-list');
        const detailPanel = document.getElementById('detail-panel');
        const detailContent = document.getElementById('detail-content');
        const detailClose = document.getElementById('detail-close');
        const filterAgent = document.getElementById('filter-agent');
        const filterEvent = document.getElementById('filter-event');
        const searchInput = document.getElementById('search-input');
        const prevPage = document.getElementById('prev-page');
        const nextPage = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');
        const totalCount = document.getElementById('total-count');
        const agentCount = document.getElementById('agent-count');

        // Initialize
        async function init() {
            await loadStats();
            await loadNotifications();
            setupEventListeners();
        }

        async function loadStats() {
            try {
                const stats = await invoke('get_stats');
                totalCount.textContent = stats.total;
                agentCount.textContent = Object.keys(stats.by_agent).length;
                
                // Populate agent filter
                filterAgent.innerHTML = '<option value="">All</option>';
                Object.keys(stats.by_agent).forEach(agent => {
                    const option = document.createElement('option');
                    option.value = agent;
                    option.textContent = `${agent} (${stats.by_agent[agent]})`;
                    filterAgent.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadNotifications() {
            try {
                notificationsList.innerHTML = '<div class="loading">Loading...</div>';
                
                const notifications = await invoke('get_notifications', {
                    limit: pageSize,
                    offset: currentPage * pageSize,
                    agent: filters.agent || null,
                    event: filters.event || null,
                    search: filters.search || null
                });

                if (notifications.length === 0) {
                    notificationsList.innerHTML = `
                        <div class="empty-state">
                            <h2>No notifications</h2>
                            <p>No notifications match your filters.</p>
                        </div>
                    `;
                    return;
                }

                notificationsList.innerHTML = notifications.map(n => `
                    <div class="notification-item ${n.id === selectedId ? 'selected' : ''}" 
                         data-id="${n.id}" onclick="selectNotification(${n.id})">
                        <div class="notification-header">
                            <div class="notification-meta">
                                <span class="notification-agent">${escapeHtml(n.agent)}</span>
                                <span class="notification-event event-${n.event}">${n.event}</span>
                            </div>
                            <span class="notification-time">${formatTime(n.timestamp)}</span>
                        </div>
                        <div class="notification-summary">${escapeHtml(n.summary)}</div>
                        <div class="notification-status status-${n.status}">
                            ${n.status} • ${n.backend}${n.audio_path ? ' • 🎵' : ''}
                        </div>
                    </div>
                `).join('');

                updatePagination();
            } catch (error) {
                console.error('Failed to load notifications:', error);
                notificationsList.innerHTML = `
                    <div class="empty-state">
                        <h2>Error loading notifications</h2>
                        <p>${escapeHtml(error)}</p>
                    </div>
                `;
            }
        }

        async function selectNotification(id) {
            selectedId = id;
            
            // Update selection styling
            document.querySelectorAll('.notification-item').forEach(el => {
                el.classList.toggle('selected', parseInt(el.dataset.id) === id);
            });

            try {
                const notification = await invoke('get_notification_by_id', { id });
                
                if (!notification) {
                    detailContent.innerHTML = '<p>Notification not found</p>';
                    return;
                }

                const metadata = notification.metadata ? JSON.parse(notification.metadata) : {};

                detailContent.innerHTML = `
                    <div class="detail-section">
                        <div class="detail-label">Agent</div>
                        <div class="detail-value">${escapeHtml(notification.agent)}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Event</div>
                        <div class="detail-value">
                            <span class="notification-event event-${notification.event}">${notification.event}</span>
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Time</div>
                        <div class="detail-value">${await invoke('format_timestamp', { timestamp: notification.timestamp })}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Summary</div>
                        <div class="detail-value">${escapeHtml(notification.summary)}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Message</div>
                        <div class="detail-value">${escapeHtml(notification.message)}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Status</div>
                        <div class="detail-value status-${notification.status}">${notification.status}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Backend</div>
                        <div class="detail-value">${escapeHtml(notification.backend)}</div>
                    </div>
                    ${notification.session_name ? `
                        <div class="detail-section">
                            <div class="detail-label">Session</div>
                            <div class="detail-value">${escapeHtml(notification.session_name)}</div>
                        </div>
                    ` : ''}
                    ${notification.audio_path ? `
                        <div class="detail-section">
                            <div class="detail-label">Audio</div>
                            <div class="detail-value">${escapeHtml(notification.audio_path)}</div>
                            <button class="play-button" onclick="playAudio(${JSON.stringify(notification.audio_path).replace(/"/g, '&quot;')})">
                                ▶ Play Audio
                            </button>
                        </div>
                    ` : ''}
                    ${Object.keys(metadata).length > 0 ? `
                        <div class="detail-section">
                            <div class="detail-label">Metadata</div>
                            <div class="detail-value"><pre>${escapeHtml(JSON.stringify(metadata, null, 2))}</pre></div>
                        </div>
                    ` : ''}
                `;

                detailPanel.classList.add('open');
            } catch (error) {
                console.error('Failed to load notification details:', error);
                detailContent.innerHTML = `<p>Error loading details: ${escapeHtml(error)}</p>`;
            }
        }

        async function playAudio(path) {
            try {
                if (window.__TAURI__?.shell?.open) {
                    await window.__TAURI__.shell.open(path);
                    return;
                }
                alert(`Audio playback is unavailable in this build.\nPath: ${path}`);
            } catch (error) {
                alert(`Failed to open audio file: ${error}`);
            }
        }

        function setupEventListeners() {
            filterAgent.addEventListener('change', (e) => {
                filters.agent = e.target.value;
                currentPage = 0;
                loadNotifications();
            });

            filterEvent.addEventListener('change', (e) => {
                filters.event = e.target.value;
                currentPage = 0;
                loadNotifications();
            });

            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filters.search = e.target.value;
                    currentPage = 0;
                    loadNotifications();
                }, 300);
            });

            detailClose.addEventListener('click', () => {
                detailPanel.classList.remove('open');
                selectedId = null;
                document.querySelectorAll('.notification-item').forEach(el => {
                    el.classList.remove('selected');
                });
            });

            prevPage.addEventListener('click', () => {
                if (currentPage > 0) {
                    currentPage--;
                    loadNotifications();
                }
            });

            nextPage.addEventListener('click', () => {
                currentPage++;
                loadNotifications();
            });
        }

        function updatePagination() {
            prevPage.disabled = currentPage === 0;
            pageInfo.textContent = `Page ${currentPage + 1}`;
            // Note: We can't know if there's a next page without total count
            // For simplicity, always enable next button
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
