name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv sync --group dev

      - name: Get version from tag
        id: get_version
        run: |
          # Remove 'v' prefix from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          export VERSION
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          python - <<'PY'
import json, os, pathlib, re
version = os.environ["VERSION"]
for path in ("package.json", "plugins/speakup-factory-plugin/.factory-plugin/plugin.json"):
    p = pathlib.Path(path)
    data = json.loads(p.read_text())
    data["version"] = version
    p.write_text(json.dumps(data, indent=2) + "\n")
for path in ("speakup-desktop/src-tauri/Cargo.toml", "speakup-desktop/src-tauri/tauri.conf.json"):
    p = pathlib.Path(path)
    text = p.read_text()
    if path.endswith(".toml"):
        text = re.sub(r'^version = ".*"', f'version = "{version}"', text, count=1, flags=re.M)
    else:
        data = json.loads(text)
        data["version"] = version
        text = json.dumps(data, indent=2) + "\n"
    p.write_text(text)
PY

      - name: Build package
        run: uv run python -m build

      - name: Check package
        run: uv run twine check dist/*

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: uv run twine upload --repository testpypi dist/*

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev_tag.outputs.prev_tag }}" ]; then
            CHANGELOG=$(git log ${{ steps.prev_tag.outputs.prev_tag }}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          # Save to file for multiline support
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "changelog_file=/tmp/changelog.txt" >> $GITHUB_OUTPUT

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: Release v${{ steps.get_version.outputs.version }} (TestPyPI)
          body_path: /tmp/changelog.txt
          files: dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages-${{ steps.get_version.outputs.version }}
          path: dist/
          retention-days: 30
