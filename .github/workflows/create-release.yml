name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi

      - name: Check for uncommitted changes
        run: |
          if ! git diff-index --quiet HEAD --; then
            echo "Error: You have uncommitted changes. Please commit or stash them first."
            git status
            exit 1
          fi

      - name: Check if tag already exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Error: Tag v$VERSION already exists"
            exit 1
          fi

      - name: Update version in pyproject.toml
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          python - <<'PY'
import json, os, pathlib, re
version = os.environ["VERSION"]
for path in ("package.json", "plugins/speakup-factory-plugin/.factory-plugin/plugin.json"):
    p = pathlib.Path(path)
    data = json.loads(p.read_text())
    data["version"] = version
    p.write_text(json.dumps(data, indent=2) + "\n")
for path in ("speakup-desktop/src-tauri/Cargo.toml", "speakup-desktop/src-tauri/tauri.conf.json"):
    p = pathlib.Path(path)
    text = p.read_text()
    if path.endswith(".toml"):
        text = re.sub(r'^version = ".*"', f'version = "{version}"', text, count=1, flags=re.M)
    else:
        data = json.loads(text)
        data["version"] = version
        text = json.dumps(data, indent=2) + "\n"
    p.write_text(text)
PY
          echo "✓ Updated project metadata to version $VERSION"

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml package.json plugins/speakup-factory-plugin/.factory-plugin/plugin.json speakup-desktop/src-tauri/Cargo.toml speakup-desktop/src-tauri/tauri.conf.json
          git commit -m "chore: bump version to $VERSION"
          echo "✓ Committed version bump"

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          git push origin HEAD:main
          echo "✓ Created and pushed tag v$VERSION"

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "## Release Created! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "  1. Monitor the TestPyPI publish workflow" >> $GITHUB_STEP_SUMMARY
          echo "  2. Test installation: \`pip install --index-url https://test.pypi.org/simple/ speakup==$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "  3. If tests pass, trigger the PyPI publish workflow" >> $GITHUB_STEP_SUMMARY
